app-id: org.pymol.PyMOL
runtime: org.kde.Platform
runtime-version: '5.15'
sdk: org.kde.Sdk
command: pymol
separate-locales: false
finish-args:
  - --share=ipc
  - --socket=x11
  - --filesystem=host
  - --socket=session-bus
  - --device=all
  - --env=PATH=/app/bin
  - --env=PYTHONPATH=/app/packages/python

modules:
  - shared-modules/glew/glew.json
  - pyside2.yaml
  - python3-numpy.yaml
  - glm.yaml
  - mmtf-cpp.yaml
  - msgpack.yaml
  - hdf5.yaml
  - netcdf.yaml
  - libpng.yaml
  - libxml2.yaml
  
  - name: pymol
    buildsystem: simple
    build-commands:
      - python setup.py install --prefix=${FLATPAK_DEST}
    sources:
      - type: git
        url: https://github.com/schrodinger/pymol-open-source
        commit: e0f39aa6d4e4d4110a914950606861dc4faf2eb7
        

